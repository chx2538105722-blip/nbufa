<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANKING的导航 - NBUFE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="semester-wrapper">
    <div class="semester-bar">
        <div id="progress-fill" class="progress-fill"></div>
    </div>
    <div class="semester-info">
        <span>第 2 学期进度</span>
        <span id="progress-percent">0%</span>
    </div>
    5</div>
    <div class="container">
        <h1 class="main-title">欢迎使用HANKING的导航</h1>
        
        <h2 class="sub-title">🏫 宁波财经学院 · 校园快捷导航</h2>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="想搜点什么？(按回车搜索)" autocomplete="off">
            <div class="search-engines">
                <span class="engine active" data-url="https://www.baidu.com/s?wd=">百度</span>
                <span class="engine" data-url="https://search.bilibili.com/all?keyword=">B站</span>
            </div>
        </div>

        <div class="nav-grid">
            <a href="https://www.nbufe.edu.cn/" class="card" target="_blank">
                <h3>学校官网</h3>
                <p>获取最新校园新闻</p>
            </a>
            <a href="https://jw1.nbufe.edu.cn/" class="card" target="_blank">
                <h3>正方教务管理系统</h3>
                <p>选课、查成绩、评教</p>
            </a>
            <a href="https://atrust.nbufe.edu.cn/" class="card" target="_blank">
                <h3>正方教务管理系统(手机端备用)</h3>
                <p>选课、查成绩、评教</p>
            </a>
            <a href="https://jf.nbufe.edu.cn/" class="card" target="_blank">
                <h3>缴费系统</h3>
                <p>学杂费、网费充值</p>
            </a>
            <a href="https://p.nbufe.edu.cn/main.html" class="card" target="_blank">
                <h3>综合门户</h3>
                <p>学校通知，校历，学工</p>
            </a>
        </div>
    </div>
    
    <a href="https://v.wjx.cn/vm/wEMfBF2.aspx" target="_blank" class="floating-feedback">
    <span>反馈</span>
    </a>
    <div class="theme-switch" id="themeToggle">🌓</div>
    <script src="script.js"></script>
</body>
</html>
